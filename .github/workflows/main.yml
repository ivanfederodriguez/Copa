name: Update Dashboard Data

on:
  schedule:
    # 18:30 Argentina (UTC-3) es 21:30 UTC
    - cron: '30 21 * * *'
  workflow_dispatch: # Permite la ejecución manual para testeo

jobs:
  update-data:
    runs-on: ubuntu-latest
    # Solución al aviso de Node.js 20: forzamos el uso de Node 24
env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # PostgreSQL
      PG_HOST: ${{ secrets.PG_HOST }}
      PG_PORT: ${{ secrets.PG_PORT }}
      PG_USER: ${{ secrets.PG_USER }}
      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      PG_DATABASE: ${{ secrets.PG_DATABASE }}
      # MySQL (Cambiados para coincidir con etl_main.py)
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run ETL Script
        run: python backend/etl_main.py && python backend/etl_personal.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data [skip ci]" && git push)
