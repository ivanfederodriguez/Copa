name: Update Dashboard Data

on:
  schedule:
    # 18:30 Argentina (UTC-3) es 21:30 UTC
    - cron: '30 21 * * *'
  workflow_dispatch: # Permite ejecución manual
  push:
    branches:
      - main # Se dispara automáticamente al subir cambios a main

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # PostgreSQL
      PG_HOST: ${{ secrets.PG_HOST }}
      PG_PORT: ${{ secrets.PG_PORT }}
      PG_USER: ${{ secrets.PG_USER }}
      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      PG_DATABASE: ${{ secrets.PG_DATABASE }}
      # MySQL/MariaDB
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      API_URL_POST: ${{ secrets.API_URL_POST }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Reconstruir archivos Excel desde Secrets
        run: |
          printf "%s" "${{ secrets.EXCEL_PRESUPUESTO }}" | base64 -d > backend/inputs/presupuesto.xlsx
          printf "%s" "${{ secrets.EXCEL_MASA_SALARIAL }}" | base64 -d > backend/inputs/masa_salarial.xlsx
          printf "%s" "${{ secrets.EXCEL_RECA }}" | base64 -d > backend/inputs/reca.xlsx
          printf "%s" "${{ secrets.EXCEL_GASTOS }}" | base64 -d > backend/inputs/Gastos.xlsx

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run ETL Script
        run: python backend/etl_main.py && python backend/etl_personal.py && python backend/update_users.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Agregamos los archivos JSON de datos actualizados
          git add data/*.json
          
          # Si prefieres que guarde CUALQUIER json que cambie, podrías usar:
          # git add *.json
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data [skip ci]" && git push origin ${GITHUB_REF_NAME})